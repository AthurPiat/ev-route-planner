<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Qivia EV</title>

    <!-- iOS home screen / PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Qivia EV">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#03060D">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
            background: #03060D;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', sans-serif;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container {
            text-align: center;
            max-width: 360px;
            width: 100%;
        }
        img.logo {
            width: 180px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto;
            border: 4px solid rgba(95, 255, 167, 0.15);
            border-top-color: #5FFFA7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #5FFFA7;
            margin-bottom: 0.5rem;
        }
        p {
            color: #9AA3B2;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        ol {
            text-align: left;
            color: #FFFFFF;
            font-size: 0.95rem;
            line-height: 1.7;
            margin: 1.5rem 0;
            padding-left: 1.2rem;
        }
        ol li b { color: #5FFFA7; }
        .btn {
            display: inline-block;
            background: #5FFFA7;
            color: #03060D;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.85rem 1.6rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
            -webkit-appearance: none;
        }
        .btn:active { background: #00E676; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="apple-touch-icon.png" class="logo" alt="Qivia">

        <!-- Standalone (home-screen icon tapped) — shows briefly during redirect -->
        <div id="standalone-splash">
            <div class="spinner"></div>
            <p style="margin-top:1.5rem;">Chargement…</p>
        </div>

        <!-- Browser mode — explains how to install + button to enter -->
        <div id="browser-onboarding" class="hidden">
            <h1>Qivia EV Planner</h1>
            <p>Ajoute cette app à ton écran d'accueil pour un accès rapide :</p>
            <ol>
                <li>Touche le bouton <b>Partager</b> ⎙ (en bas de Safari)</li>
                <li>Choisis <b>« Sur l'écran d'accueil »</b></li>
                <li>Confirme avec <b>Ajouter</b></li>
            </ol>
            <p style="font-size:0.85rem;">Ou continue directement dans le navigateur :</p>
            <button class="btn" onclick="goToApp()">Entrer dans l'app →</button>
        </div>
    </div>

    <script>
        const APP_URL = "https://ev-route-planner-arthur.streamlit.app/";

        function goToApp() {
            window.location.replace(APP_URL);
        }

        // Detect if launched from iOS home-screen icon (PWA standalone)
        // or Android Chrome PWA standalone.
        const isStandalone =
            window.navigator.standalone === true ||
            window.matchMedia("(display-mode: standalone)").matches;

        if (isStandalone) {
            // Launched as installed app — redirect after a short splash.
            document.getElementById("standalone-splash").classList.remove("hidden");
            setTimeout(goToApp, 800);
        } else {
            // Visited in browser — show onboarding so the user can install.
            document.getElementById("standalone-splash").classList.add("hidden");
            document.getElementById("browser-onboarding").classList.remove("hidden");
        }
    </script>
    <noscript>
        <meta http-equiv="refresh" content="2; url=https://ev-route-planner-arthur.streamlit.app/">
    </noscript>
</body>
</html>
